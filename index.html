<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>記念日カウンター</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kaisei Tokumin', serif;
            color: white;
            text-align: center;
            height: 100vh;
            overflow: auto;
        }
        
        video#bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            object-fit: cover;
            width: 100vw;
            height: 100vh;
            z-index: -2;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.3);
            /* 白フィルター */
            z-index: -1;
        }
        
        h1 {
            font-size: 40px;
            margin-top: 50px;
            text-shadow: 2px 2px 4px #ffb6c1;
        }
        
        .info-box {
            background-color: rgba(255, 255, 255, 0.85);
            color: #333;
            border-radius: 20px;
            padding: 20px 30px;
            margin: 20px auto;
            width: fit-content;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(255, 105, 180, 0.2);
            transition: 0.3s ease;
        }
        
        .info-box:hover {
            box-shadow: 0 6px 12px rgba(255, 105, 180, 0.5);
        }
        
        #soundToggleBtn {
            font-family: 'Kaisei Tokumin', serif;
            background: white;
            color: #ff69b4;
            border: 2px solid #ff69b4;
            padding: 14px 28px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(255, 105, 180, 0.3);
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            transition: all 0.3s ease;
        }
        
        #soundToggleBtn:hover {
            background-color: #ff69b4;
            color: white;
            box-shadow: 0 6px 12px rgba(255, 105, 180, 0.6);
            transform: scale(1.05);
        }
        
        .map-toggle-btn {
            font-family: 'Kaisei Tokumin', serif;
            background: white;
            color: #ff69b4;
            border: 2px solid #ff69b4;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            margin: 0 5px;
            transition: all 0.3s ease;
        }
        
        .map-toggle-btn:hover {
            background-color: #ff69b4;
            color: white;
            box-shadow: 0 6px 12px rgba(255, 105, 180, 0.6);
            transform: scale(1.05);
        }
        
        .map-toggle-btn.active {
            background-color: #ff69b4;
            color: white;
        }
        /* ローディング画面 */
        
        #loadingScreen {
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom right, #ffe4ec, #ffc1da);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-family: 'Kaisei Tokumin', serif;
            color: #ff69b4;
            font-size: 28px;
            animation: fadeIn 1s ease-in-out;
            transition: opacity 1s ease;
        }
        /* ローディング用のアニメーション（ハートが軽く上下） */
        
        .heartbeat {
            font-size: 40px;
            animation: beat 1s infinite;
        }
        
        @keyframes beat {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
</head>

<body>

    <!-- ローディング画面 -->
    <div id="loadingScreen">
        <div class="heartbeat"></div>
        loading...
    </div>

    <!-- 背景動画 -->
    <video id="bgVideo" autoplay loop muted playsinline>
    <source src="https://cdn-sendy-cloud.sendycloud.com/users/geIiBNpb3qZvZqntYaQXtWlr4XT2/root/2025/05/19/b7b270b3346b68e9637c57f3f8d1c9801ddb3365ff4dbe2b973d26ae89ad749d705177.mp4?response-content-disposition=attachment%3Bfilename%2A=UTF-8%27%27%25E7%2584%25A1%25E9%25A1%258C%25E3%2581%25AE%25E5%258B%2595%25E7%2594%25BB+%25E2%2580%2590+Clipchamp%25E3%2581%25A7%25E4%25BD%259C%25E6%2588%2590+%25281%2529.mp4&Expires=1747678290&Signature=RO-ADEkUsNNge4Cj~ixtrBkhbWxrHtBVHSgKahdiu~bny1PI9POevJTle73ZdWhvcMvthwsUYfcQZbEuOVm3m54Q2fi696bMtJfGyx95ZPeaveCawusnUv6qIoPUQd5nYlYGss8jEoxLXOg1rYd0l3RZ1SKKBonG7fz3SwVbuTf39hT0K6bbljjbffsyxiZJEdLr5u3lGM6esfELSdTUFolmaQX82czDjFYZjhlrBRQFKkNxH-ewcc6GqU5LEPTOk179qQOpb~tl1nMX7q8GNqx3JERFEJbGFMeGOIBQAB4Wv4klPdpReyskh9xkAIWs8SX9Zeh0C~WrWg3S8nC3hw__&Key-Pair-Id=APKAJYC3MQ7ZANDXTCGQ#t=0.5" type="video/mp4" />
    お使いのブラウザは video タグに対応していません。
  </video>

    <!-- 白いフィルター -->
    <div class="overlay"></div>

    <!-- タイトル -->
    <h1>ある＆きょーか</h1>
    <h3>♡2024年4月13日♡</h3>
    <marquee>2024/3/19 初めて会った日 -- 2024/4/13 付き合った日！ -- 2024/7/20~27 ロサンゼルス旅行✈ -- 2024/7/24 初ディズニーデートがカリフォルニアディズニー！？🏰 -- 2024/9/14~17 熱海旅行🚅 -- 2024/10/15 マジカルミライ初参戦🪄 -- 2024/10/27 初東京ディズニーデート🏰 -- 2025/1/5~8 誕生日沖縄旅行🌴 -- 2025/4/11~15 シンガポール旅行✈ -- 大阪に行った回数１４回
        -- 東京に来てもらった回数１２回</marquee>

    <!-- 記念日情報 -->
    <div id="elapsedTime" class="info-box"></div>
    <div id="nextAnniversary" class="info-box"></div>

    <!-- 音量ボタン -->
    <button id="soundToggleBtn" onclick="toggleMute()">🔇</button>
    <!-- 地図トグル -->
    <div style="margin-top: 20px;">
        <div style="margin-bottom: 10px;">
            <button id="toggleJapan" class="map-toggle-btn active">🗾 日本</button>
            <button id="toggleWorld" class="map-toggle-btn">🌏 世界</button>
        </div>
        <div id="mapContainer">
            <img id="mapImage" src="https://github.com/183x/arukyo/blob/main/mvTYTCqbpQEfoqN1747654176_1747654294.png?raw=true" alt="訪れた場所の地図" style="max-width: 80%; height: auto; border-radius: 20px;" />

        </div>
    </div>

    <script>
        const startDate = new Date(2024, 3, 13); // 4月13日（0始まり）
        const elapsedTimeElem = document.getElementById("elapsedTime");
        const nextAnniversaryElem = document.getElementById("nextAnniversary");

        function updateElapsedTime() {
            const now = new Date();
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();
            let hours = now.getHours() - startDate.getHours();
            let minutes = now.getMinutes() - startDate.getMinutes();
            let seconds = now.getSeconds() - startDate.getSeconds();

            if (seconds < 0) {
                seconds += 60;
                minutes--;
            }
            if (minutes < 0) {
                minutes += 60;
                hours--;
            }
            if (hours < 0) {
                hours += 24;
                days--;
            }
            if (days < 0) {
                const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                days += prevMonth;
                months--;
            }
            if (months < 0) {
                months += 12;
                years--;
            }

            elapsedTimeElem.textContent = `一緒に過ごしてから ${years}年${months}ヶ月${days}日 ${hours}時間${minutes}分${seconds}秒`;
        }

        function updateNextAnniversary() {
            const now = new Date();
            let next = new Date(now.getFullYear(), now.getMonth(), 13);
            if (now.getDate() > 13) next = new Date(now.getFullYear(), now.getMonth() + 1, 13);

            const diff = next - now;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

            let monthsPassed = (next.getFullYear() - startDate.getFullYear()) * 12 + (next.getMonth() - startDate.getMonth());
            let years = Math.floor(monthsPassed / 12);
            let months = monthsPassed % 12;

            nextAnniversaryElem.textContent = `あと${days}日で ${years}年${months}ヶ月記念日！`;
        }

        setInterval(updateElapsedTime, 1000);
        setInterval(updateNextAnniversary, 60 * 1000);
        updateElapsedTime();
        updateNextAnniversary();

        function toggleMute() {
            const video = document.getElementById("bgVideo");
            const btn = document.getElementById("soundToggleBtn");

            video.muted = !video.muted;

            if (video.muted) {
                btn.textContent = "🔇";
            } else {
                btn.textContent = "🔊";
                video.play();
            }
        }

        // 地図の切り替え機能
        const mapImage = document.getElementById("mapImage");
        const toggleJapan = document.getElementById("toggleJapan");
        const toggleWorld = document.getElementById("toggleWorld");

        toggleJapan.addEventListener("click", () => {
            mapImage.src = "https://github.com/183x/arukyo/blob/main/mvTYTCqbpQEfoqN1747654176_1747654294.png?raw=true";
            toggleJapan.classList.add("active");
            toggleWorld.classList.remove("active");
        });

        toggleWorld.addEventListener("click", () => {
            mapImage.src = "https://github.com/183x/arukyo/blob/main/Gk3hbrd8HlFwpQp1747654536_1747654539.png?raw=true";
            toggleWorld.classList.add("active");
            toggleJapan.classList.remove("active");
        });

        // 背景動画の読み込み完了でローディング非表示
        const video = document.getElementById("bgVideo");
        const loadingScreen = document.getElementById("loadingScreen");

        video.addEventListener("canplaythrough", () => {
            loadingScreen.style.opacity = "0";
            setTimeout(() => {
                loadingScreen.style.display = "none";
            }, 1000); // フェードアウトと同期
        });
    </script>



</body>

</html>
