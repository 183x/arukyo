            box-shadow: 0 4px 10px rgba(255, 192, 203, 0.4);
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
            transition: box-shadow 0.3s ease;
        }
        
        .box:hover {
            box-shadow: 0 0 12px rgba(255, 105, 180, 0.7);
        }
        
        @media (max-width: 600px) {

            }

            }

    <!-- メインコンテンツ -->
    <div class="container">
        <h1>ある＆きょーか</h1>
        <h3>記念日カウンター✨</h3>
        <h4>♡2024年4月13日♡</h4>
        <div id="elapsedTime" class="box"></div>
        <div id="nextAnniversary" class="box"></div>
    </div>

    <script>
        // 動画のミュート解除（自動再生）
        window.addEventListener('load', () => {
            const video = document.getElementById('bgVideo');
            video.muted = false;
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    video.muted = true;
                    video.play();
                });
            }
        });

        // 記念日
        const startDate = new Date(2024, 3, 13);

        function updateElapsedTime() {
            const now = new Date();
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();
            let hours = now.getHours() - startDate.getHours();
            let minutes = now.getMinutes() - startDate.getMinutes();
            let seconds = now.getSeconds() - startDate.getSeconds();

            if (seconds < 0) {
                seconds += 60;
                minutes--;
            }
            if (minutes < 0) {
                minutes += 60;
                hours--;
            }
            if (hours < 0) {
                hours += 24;
                days--;
            }
            if (days < 0) {
                const previousMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                days += previousMonth.getDate();
                months--;
            }
            if (months < 0) {
                months += 12;
                years--;
            }

            document.getElementById('elapsedTime').textContent =
                `一緒に過ごしてから ${years}年${months}ヶ月${days}日${hours}時間${minutes}分${seconds}秒`;
        }

        function updateNextMonthlyAnniversary() {
            const now = new Date();
            const anniversaryDay = 13;

            let next = new Date(now.getFullYear(), now.getMonth(), anniversaryDay);
            if (now.getDate() > anniversaryDay) {
                next = new Date(now.getFullYear(), now.getMonth() + 1, anniversaryDay);
            }

            const timeDiff = next - now;
            const daysLeft = Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
            let monthsSinceStart = (next.getFullYear() - startDate.getFullYear()) * 12 + (next.getMonth() - startDate.getMonth());
            const years = Math.floor(monthsSinceStart / 12);
            const months = monthsSinceStart % 12;

            document.getElementById('nextAnniversary').textContent =
                `あと ${daysLeft}日で ${years}年${months}ヶ月記念日！`;
        }

        updateElapsedTime();
        updateNextMonthlyAnniversary();
        setInterval(updateElapsedTime, 1000);
        setInterval(updateNextMonthlyAnniversary, 3600000);
    </script>
