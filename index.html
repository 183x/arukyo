<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>記念日カウンター</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Tokumin:wght@700&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Kaisei Tokumin', serif;
            color: white;
            text-align: center;
            height: 100vh;
            overflow: hidden;
        }
        /* 背景動画 */
        
        video#bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            object-fit: cover;
            width: 100vw;
            height: 100vh;
            z-index: -2;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.3);
            z-index: -1;
        }
        
        h1 {
            font-size: 40px;
            margin-top: 50px;
            text-shadow: 2px 2px 4px #ffb6c1;
        }
        
        .info-box {
            background-color: rgba(255, 255, 255, 0.85);
            color: #333;
            border-radius: 20px;
            padding: 20px 30px;
            margin: 20px auto;
            width: fit-content;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(255, 105, 180, 0.2);
            transition: 0.3s ease;
        }
        
        .info-box:hover {
            box-shadow: 0 6px 12px rgba(255, 105, 180, 0.5);
        }
        
        #soundToggleBtn {
            font-family: 'Kaisei Tokumin', serif;
            background: white;
            color: #ff69b4;
            border: 2px solid #ff69b4;
            padding: 14px 28px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(255, 105, 180, 0.3);
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            transition: all 0.3s ease;
        }
        
        #soundToggleBtn:hover {
            background-color: #ff69b4;
            color: white;
            box-shadow: 0 6px 12px rgba(255, 105, 180, 0.6);
            transform: scale(1.05);
        }
        
        .map-toggle-btn {
            font-family: 'Kaisei Tokumin', serif;
            background: white;
            color: #ff69b4;
            border: 2px solid #ff69b4;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            margin: 0 5px;
            transition: all 0.3s ease;
        }
        
        .map-toggle-btn:hover {
            background-color: #ff69b4;
            color: white;
            box-shadow: 0 6px 12px rgba(255, 105, 180, 0.6);
            transform: scale(1.05);
        }
        
        .map-toggle-btn.active {
            background-color: #ff69b4;
            color: white;
        }
        /* 🎀 ローディング画面 */
        
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        
        .draw-svg {
            width: 350px;
            height: 100px;
        }
        
        .draw-text {
            font-family: 'Kaisei Tokumin', serif;
            font-size: 50px;
            fill: none;
            stroke: #ff69b4;
            stroke-width: 2;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: draw 0.5s ease forwards;
            animation-delay: calc(var(--i) * 0.3s);
            /* 0.3秒ずつずらす */
        }
        
        @keyframes draw {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>

<body>

    <!-- 🎀 ローディング画面 -->
    <div id="loadingScreen">
        <svg viewBox="0 0 350 100" class="draw-svg" aria-label="loading... animation" role="img">
            <text x="10" y="70" class="draw-text" style="--i:0;">l</text>
            <text x="50" y="70" class="draw-text" style="--i:1;">o</text>
            <text x="90" y="70" class="draw-text" style="--i:2;">a</text>
            <text x="130" y="70" class="draw-text" style="--i:3;">d</text>
            <text x="170" y="70" class="draw-text" style="--i:4;">i</text>
            <text x="190" y="70" class="draw-text" style="--i:5;">n</text>
            <text x="230" y="70" class="draw-text" style="--i:6;">g</text>
            <text x="270" y="70" class="draw-text" style="--i:7;">.</text>
            <text x="310" y="70" class="draw-text" style="--i:8;">.</text>
        </svg>
    </div>

    <!-- 背景動画 -->
    <video id="bgVideo" autoplay loop muted playsinline>
        <source src="https://pixeldrain.com/api/file/ZLvLZ2kn" type="video/mp4" />
        お使いのブラウザは video タグに対応していません。
    </video>

    <!-- 白いフィルター -->
    <div class="overlay"></div>

    <!-- タイトル -->
    <h1>ある＆きょーか</h1>
    <h3>♡2024年4月13日♡</h3>

    <!-- 記念日情報 -->
    <div id="elapsedTime" class="info-box"></div>
    <div id="nextAnniversary" class="info-box"></div>

    <!-- 音量ボタン -->
    <button id="soundToggleBtn" onclick="toggleMute()">🔇</button>

    <!-- 地図トグル -->
    <div style="margin-top: 20px;">
        <div style="margin-bottom: 10px;">
            <button id="toggleJapan" class="map-toggle-btn active">🗾 日本</button>
            <button id="toggleWorld" class="map-toggle-btn">🌏 世界</button>
        </div>
        <div id="mapContainer">
            <img id="mapImage" src="https://github.com/183x/arukyo/blob/main/mvTYTCqbpQEfoqN1747654176_1747654294.png?raw=true" alt="訪れた場所の地図" style="max-width: 80%; height: auto; border-radius: 20px;" />
        </div>
    </div>

    <script>
        const startDate = new Date(2024, 3, 13); // 4月13日
        const elapsedTimeElem = document.getElementById("elapsedTime");
        const nextAnniversaryElem = document.getElementById("nextAnniversary");

        function updateElapsedTime() {
            const now = new Date();
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();
            let hours = now.getHours() - startDate.getHours();
            let minutes = now.getMinutes() - startDate.getMinutes();
            let seconds = now.getSeconds() - startDate.getSeconds();

            if (seconds < 0) {
                seconds += 60;
                minutes--;
            }
            if (minutes < 0) {
                minutes += 60;
                hours--;
            }
            if (hours < 0) {
                hours += 24;
                days--;
            }
            if (days < 0) {
                const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                days += prevMonth;
                months--;
            }
            if (months < 0) {
                months += 12;
                years--;
            }

            elapsedTimeElem.textContent = `一緒に過ごしてから ${years}年${months}ヶ月${days}日 ${hours}時間${minutes}分${seconds}秒`;
        }

        function updateNextAnniversary() {
            const now = new Date();
            let next = new Date(now.getFullYear(), now.getMonth(), 13);
            if (now.getDate() > 13) next = new Date(now.getFullYear(), now.getMonth() + 1, 13);
            const diff = next - now;
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

            let monthsPassed = (next.getFullYear() - startDate.getFullYear()) * 12 + (next.getMonth() - startDate.getMonth());
            let years = Math.floor(monthsPassed / 12);
            let months = monthsPassed % 12;

            nextAnniversaryElem.textContent = `あと${days}日で ${years}年${months}ヶ月記念日！`;
        }

        setInterval(updateElapsedTime, 1000);
        setInterval(updateNextAnniversary, 60000);
        updateElapsedTime();
        updateNextAnniversary();

        function toggleMute() {
            const video = document.getElementById("bgVideo");
            const btn = document.getElementById("soundToggleBtn");
            video.muted = !video.muted;
            btn.textContent = video.muted ? "🔇" : "🔊";
        }

        // ローディング画面フェードアウト
        window.addEventListener('load', () => {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 1000);
        });
    </script>

</body>

</html>
